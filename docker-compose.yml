services:
  ollama:
      build:
        context: .
        dockerfile: Dockerfile
      container_name: passport-ocr-ollama
      ports:
        - "11434:11434"
      volumes:
        - ~/.ollama:/root/.ollama
      healthcheck:
        test: ["CMD-SHELL", "curl -f http://localhost:11434/api/tags || exit 1"]
        interval: 5s
        timeout: 10s
        retries: 25
        start_period: 40s      # самое важное — даём Ollama время на запуск
      restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: passport-ocr-server
    environment:
      OLLAMA_HOST: http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./server/storage:/app/server/storage

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
    container_name: passport-ocr-frontend
    depends_on:
      - server
    ports:
      - "5173:80"
