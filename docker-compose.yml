services:
  ollama:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: passport-ocr-ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 30s

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: passport-ocr-server
    environment:
      OLLAMA_HOST: http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./server/storage:/app/server/storage

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
    container_name: passport-ocr-frontend
    depends_on:
      - server
    ports:
      - "5173:80"
